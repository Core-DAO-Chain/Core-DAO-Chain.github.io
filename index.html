<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Core DAO Chain - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Core DAO Chain DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://core-dao-chain.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #f7f5f1;
  --surface: #ffffff;
  --panel: #fbfaf7;
  --ink: #15120e;
  --muted: #69645c;
  --soft: #928a7f;
  --line: rgba(21, 18, 14, 0.10);
  --line-strong: rgba(21, 18, 14, 0.16);
  --accent: #ff9211;
  --accent-soft: rgba(255, 146, 17, 0.13);
  --shadow: 0 28px 80px -44px rgba(31, 24, 15, 0.48);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  min-height: 100dvh;
  margin: 0;
  overflow: hidden;
  color: var(--ink);
  background:
    radial-gradient(circle at 50% -14%, rgba(255, 146, 17, 0.16), transparent 38%),
    linear-gradient(180deg, #fffdf8 0%, var(--bg) 58%, #f0ede7 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

p,
h1 {
  margin: 0;
}

.topbar {
  height: 72px;
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px clamp(18px, 4vw, 44px);
  flex: 0 0 auto;
}

.brand {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  gap: 10px;
  font-size: 1rem;
  font-weight: 750;
  letter-spacing: 0;
  white-space: nowrap;
}

.brand img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  box-shadow: 0 0 0 1px var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-left: 10px;
}

.nav a {
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 550;
  white-space: nowrap;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--ink);
}

.spacer {
  flex: 1;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 18px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.54);
  color: var(--ink);
  font-size: 0.91rem;
  font-weight: 700;
  box-shadow: 0 10px 24px -20px rgba(21, 18, 14, 0.44);
  transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
}

.ghost:hover {
  border-color: rgba(255, 146, 17, 0.48);
  background: var(--surface);
  transform: translateY(-1px);
}

.stage {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 10px clamp(18px, 4vw, 44px) 0;
  text-align: center;
}

.hero {
  max-width: 760px;
}

h1 {
  font-size: clamp(3rem, 7vw, 5.2rem);
  line-height: 0.98;
  letter-spacing: 0;
  font-weight: 820;
}

.sub {
  max-width: 58ch;
  margin: 18px auto 0;
  color: var(--muted);
  font-size: clamp(1rem, 1.65vw, 1.18rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
  box-shadow: inset 0 -0.44em 0 var(--accent-soft);
}

.app-card {
  width: min(620px, 100%);
  margin-top: clamp(24px, 4.8vh, 40px);
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.98)),
    var(--surface);
  box-shadow: var(--shadow);
}

.route {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 42px minmax(0, 1fr);
  gap: 12px;
  align-items: stretch;
}

.leg {
  min-width: 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 15px;
  background: var(--panel);
  text-align: left;
}

.label {
  display: block;
  color: var(--soft);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  min-width: 0;
  gap: 10px;
  margin-top: 9px;
  color: var(--ink);
  font-size: 1.04rem;
  font-weight: 820;
}

.chip img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex: 0 0 auto;
}

.chip span {
  min-width: 0;
  overflow-wrap: anywhere;
}

.chip-muted {
  color: #3d3831;
  font-weight: 760;
}

.switch {
  align-self: center;
  width: 42px;
  height: 42px;
  padding: 0;
  border: 1px solid rgba(255, 146, 17, 0.34);
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background 160ms ease, color 160ms ease, transform 180ms ease;
}

.switch span {
  font-size: 1.15rem;
  line-height: 1;
}

.switch:hover {
  background: var(--accent);
  color: #ffffff;
  transform: translateY(-1px);
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 54px;
  margin-top: 16px;
  border-radius: 15px;
  background: var(--accent);
  color: #ffffff;
  font-size: 1.03rem;
  font-weight: 820;
  box-shadow: 0 18px 38px -24px rgba(255, 146, 17, 0.82);
  transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
}

.primary:hover {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 22px 42px -24px rgba(255, 146, 17, 0.92);
}

.foot {
  height: 56px;
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px 18px;
  color: var(--soft);
  font-size: 0.85rem;
  font-weight: 650;
}

@media (max-width: 680px) {
  .topbar {
    height: 64px;
    gap: 12px;
    padding-inline: 16px;
  }

  .brand span {
    max-width: 44vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav {
    display: none;
  }

  .ghost {
    min-height: 38px;
    padding-inline: 14px;
  }

  .stage {
    padding: 2px 16px 0;
  }

  h1 {
    font-size: clamp(2.62rem, 14vw, 3.3rem);
  }

  .sub {
    margin-top: 13px;
    font-size: 0.98rem;
    line-height: 1.45;
  }

  .app-card {
    margin-top: 22px;
    padding: 14px;
    border-radius: 18px;
  }

  .route {
    grid-template-columns: 1fr;
    gap: 9px;
  }

  .leg {
    padding: 12px;
  }

  .chip {
    font-size: 1rem;
  }

  .switch {
    width: 38px;
    height: 38px;
    justify-self: center;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 50px;
    margin-top: 12px;
  }

  .foot {
    height: 44px;
    padding-bottom: 12px;
  }
}

@media (max-width: 380px) {
  .brand {
    gap: 8px;
  }

  .brand span {
    max-width: 41vw;
  }

  h1 {
    font-size: 2.54rem;
  }

  .sub {
    font-size: 0.94rem;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Core DAO Chain</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Core DAO Chain</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Core DAO Chain &mdash; 2026</footer>
</body>
</html>
