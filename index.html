<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Core DAO Chain</title>
  <meta name="description" content="Core DAO Chain is a Bitcoin-aligned EVM blockchain for DeFi and staking, reached from your own wallet.">
  <link rel="canonical" href="https://core-dao-chain.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5F1">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Core DAO Chain">
  <meta property="og:description" content="Core DAO Chain is a Bitcoin-aligned EVM blockchain for DeFi and staking, reached from your own wallet.">
  <meta property="og:url" content="https://core-dao-chain.github.io/">
  <meta property="og:image" content="https://core-dao-chain.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Core DAO Chain">
  <meta name="twitter:description" content="Core DAO Chain is a Bitcoin-aligned EVM blockchain for DeFi and staking, reached from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://core-dao-chain.github.io/#website",
        "url": "https://core-dao-chain.github.io/",
        "name": "Core DAO Chain",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://core-dao-chain.github.io/#organization",
        "name": "Core DAO",
        "url": "https://coredao.org/",
        "logo": "https://core-dao-chain.github.io/favicon.png"
      },
      {
        "@type": "WebApplication",
        "@id": "https://core-dao-chain.github.io/#app",
        "name": "Core DAO Chain",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://core-dao-chain.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="dashboard/" rel="noopener noreferrer" aria-label="Core DAO Chain home">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Core DAO Chain</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://scan.coredao.org/" target="_blank" rel="nofollow noopener noreferrer">Core Scan</a>
      <a href="https://coredao.org/" target="_blank" rel="nofollow noopener noreferrer">Official site</a>
      <a href="https://www.coingecko.com/en/coins/core" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Core DAO Chain</h1>
      <p class="sub"><strong>Core DAO Chain</strong> is a Bitcoin-aligned EVM blockchain for DeFi and staking, reached from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Network entry">
      <div class="route">
        <div class="leg">
          <span class="label">Network</span>
          <span class="chip">
            <img src="coredao.png" width="30" height="30" alt="Core DAO">
            <span>Core DAO</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch network direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">Hint</span>
          <span class="chip chip-muted">
            <img src="eth.png" width="30" height="30" alt="Ethereum">
            <span>Bridge from Ethereum</span>
          </span>
        </div>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&#8250;</span></a>
    </section>
  </main>

  <footer class="foot">Core DAO Chain &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
</html>
